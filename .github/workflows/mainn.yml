name: Build Android APK

on:
  workflow_dispatch:      # запуск вручную кнопкой в GitHub
  push:
    branches: [main]      # + автозапуск при каждом пуше в main

env:
  PYTHON_VERSION: "3.12"
  JAVA_VERSION: "17"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout код
        uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Установка Java (нужна для сборки Android)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Установка Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Сборка APK
        # flet build сам скачивает нужную версию Flutter при первом запуске.
        # "yes |" автоматически отвечает "да" на вопрос подтверждения установки,
        # иначе сборка виснет/падает в неинтерактивном режиме CI.
        run: yes | flet build apk --verbose

      - name: Загрузка APK как артефакт сборки
        uses: actions/upload-artifact@v4
        with:
          name: music-player-apk
          path: build/apk/*.apk
