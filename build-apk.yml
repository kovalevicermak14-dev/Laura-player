name: Build Android APK

on:
  workflow_dispatch:      # запуск вручную кнопкой в GitHub
  push:
    branches: [main]      # + автозапуск при каждом пуше в main

env:
  PYTHON_VERSION: "3.12"
  FLUTTER_VERSION: "3.24.3"
  JAVA_VERSION: "17"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout код
        uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Установка Java (нужна для сборки Android)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Установка Flutter (движок сборки Flet)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"

      - name: Установка Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Сборка APK
        run: flet build apk --verbose

      - name: Загрузка APK как артефакт сборки
        uses: actions/upload-artifact@v4
        with:
          name: music-player-apk
          path: build/apk/*.apk
